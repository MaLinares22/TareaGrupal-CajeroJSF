<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/template/layout.xhtml">
    <ui:define name="content">
        <h2>Realizar Retiro</h2>
        
        <h3>Cuenta: <span class="account-number">#{cajeroBean.clienteActual.numeroCuenta}</span></h3>
        <h3>Saldo disponible: L. #{cajeroBean.clienteActual.saldo}</h3>
        
        <h:messages globalOnly="true" styleClass="messages messages-error"/>
        
        <h:form>
            <div class="form-group">
                <label>Monto a retirar (L):</label>
                <h:inputText value="#{cajeroBean.monto}" required="true"
                           placeholder="0.00">
                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                </h:inputText>
                <small>Ingrese un monto positivo que no exceda su saldo</small>
            </div>
            
            <div class="button-group">
                <h:commandButton value="Retirar" 
                               action="#{cajeroBean.realizarRetiro}" 
                               styleClass="btn"/>
                
                <h:button value="Cancelar" outcome="menu" 
                         styleClass="btn btn-secondary"/>
            </div>
        </h:form>
    </ui:define>
</ui:composition>
</html>
