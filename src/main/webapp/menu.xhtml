<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/template/layout.xhtml">
    <ui:define name="content">
        <h2>Menu Principal</h2>
        
        <h3>Bienvenido, Cuenta: <span class="account-number">#{cajeroBean.clienteActual.numeroCuenta}</span></h3>
        
        <h:messages globalOnly="true" styleClass="messages messages-info"/>
        
        <div class="menu">
            <h:link outcome="deposito" value="Realizar Depósito"/>
            <h:link outcome="retiro" value="Realizar Retiro"/>
            <h:link outcome="saldo" value="Consultar Saldo"/>
        </div>
        
        <h:form>
            <h:commandButton value="Cerrar Sesión" 
                           action="#{cajeroBean.cerrarSesion}" 
                           styleClass="btn btn-danger"/>
        </h:form>
    </ui:define>
</ui:composition>
</html>
